// ── STATE ──────────────────────────────────────────────────────
let lang = "en";
let currentQ = 0;
let scores = {dog:0, cat:0};
let busy = false;
const BG_ICONS = ["🐕","🐈","🦴","🐾","🐩","🐱","🦮","😺","🐕‍🦺","😸"];

// ── FLOATERS ───────────────────────────────────────────────────
(function createFloaters(){
  for(let i=0;i<14;i++){
    const d=document.createElement("div");
    d.className="floater";
    d.textContent=BG_ICONS[i%BG_ICONS.length];
    d.style.cssText=`left:${Math.random()*100}%;font-size:${1.1+Math.random()*1.4}rem;animation-duration:${8+Math.random()*8}s;animation-delay:${Math.random()*10}s;`;
    document.body.appendChild(d);
  }
})();

// ── LANGUAGE ───────────────────────────────────────────────────
function toggleLangMenu(){
  const menu=document.getElementById('lang-menu');
  const trigger=document.getElementById('lang-trigger');
  const isOpen=menu.classList.contains('open');
  menu.classList.toggle('open',!isOpen);
  trigger.classList.toggle('open',!isOpen);
  trigger.setAttribute('aria-expanded',String(!isOpen));
}
function selectLang(l){
  closeLangMenu();
  setLang(l);
}
function closeLangMenu(){
  document.getElementById('lang-menu').classList.remove('open');
  document.getElementById('lang-trigger').classList.remove('open');
  document.getElementById('lang-trigger').setAttribute('aria-expanded','false');
}
function setLang(l){
  if(!T[l]) return;
  lang=l;
  document.documentElement.lang=l;
  document.querySelectorAll('.lang-item').forEach(b=>{
    b.classList.toggle('active',b.dataset.lang===l);
  });
  const activeItem=document.querySelector('.lang-item[data-lang="'+l+'"]');
  if(activeItem){
    const flag=activeItem.querySelector('.item-flag').textContent;
    const labelText=activeItem.textContent.replace('✓','').trim();
    document.querySelector('#lang-trigger .trigger-flag').textContent=flag;
    document.getElementById('trigger-label').textContent=labelText;
  }
  updateIntroText();
  if(document.getElementById('quiz').style.display!=='none') renderQuestion();
  else if(document.getElementById('result').style.display!=='none') showResult();
}

function t(){ return T[lang]; }

function updateIntroText(){
  const d=t();
  document.getElementById("i-dog").textContent=d.dogWord;
  document.getElementById("i-cat").textContent=d.catWord;
  // re-set the "or" word — keep it simple, between the spans
  document.getElementById("intro").querySelector("h1").innerHTML=
    `<span class="dog">${d.dogWord}</span> <span style="color:rgba(255,255,255,.6);font-size:1.3rem">／</span> <span class="cat">${d.catWord}</span>`;
  document.getElementById("i-sub").textContent=d.sub;
  document.getElementById("i-hint").textContent=d.hint;
  document.getElementById("i-btn").textContent=d.btn;
  // set page title and html lang
  document.title = d.pageTitle || `${d.dogWord} / ${d.catWord} — Pet Quiz`;
  document.documentElement.lang = lang;
  // update SEO meta tags and alternates
  try{ updateSEO(); }catch(e){/* non-fatal */}
}

// ── SCREENS ────────────────────────────────────────────────────
function show(id){
  ["intro","quiz","result"].forEach(s=>{
    document.getElementById(s).style.display=s===id?"block":"none";
  });
}

// ── QUIZ ───────────────────────────────────────────────────────
function startQuiz(){
  sfxNext();
  currentQ=0; scores={dog:0,cat:0}; busy=false;
  renderQuestion();
  show("quiz");
}

function renderQuestion(){
  const d=t();
  const q=d.questions[currentQ];
  const qLabel=d.qOf.replace("{n}",currentQ+1).replace("{total}",d.questions.length);

  document.getElementById("q-counter").textContent=qLabel;
  document.getElementById("q-scores").textContent=`🐶 ${scores.dog} | 🐱 ${scores.cat}`;
  document.getElementById("progress-fill").style.width=((currentQ/d.questions.length)*100)+"%";
  document.getElementById("q-emoji").textContent=q.emoji;
  document.getElementById("q-text").textContent=q.text;
  document.getElementById("lb-dog").textContent=d.lbDog;
  document.getElementById("lb-cat").textContent=d.lbCat;
  updateScoreBars();

  const opts=document.getElementById("options");
  opts.innerHTML="";
  q.options.forEach((opt,i)=>{
    const btn=document.createElement("button");
    btn.type = 'button';
    btn.className="opt";
    btn.style.animation=`slideRight .3s ease ${i*.07}s both`;
    btn.setAttribute('aria-pressed','false');
    btn.setAttribute('aria-label', `Answer option ${i+1}: ${opt.text}`);
    btn.innerHTML=`<span class="num">${i+1}.</span><span class="label">${opt.text}</span>`;
    btn.onclick=()=>pickAnswer(opt,btn);
    opts.appendChild(btn);
  });
}

function pickAnswer(opt,btn){
  if(busy)return;
  busy=true;
  sfxClick();
  const isDog=opt.dog>=opt.cat;
  btn.classList.add(isDog?"sel-dog":"sel-cat");
  btn.querySelector(".num").textContent=isDog?"🐶":"🐱";
  btn.setAttribute('aria-pressed','true');
  btn.disabled = true;

  setTimeout(()=>{
    document.querySelectorAll(".opt").forEach(b=>b.classList.add("fading"));
    setTimeout(()=>{
      scores.dog+=opt.dog; scores.cat+=opt.cat;
      currentQ++;
      const d=t();
      if(currentQ>=d.questions.length){ sfxResult(); showResult(); }
      else { sfxNext(); busy=false; renderQuestion(); }
    },280);
  },480);
}

function updateScoreBars(){
  const max=40;
  document.getElementById("dog-score-label").textContent=scores.dog;
  document.getElementById("cat-score-label").textContent=scores.cat;
  document.getElementById("dog-bar").style.width=((scores.dog/max)*100)+"%";
  document.getElementById("cat-bar").style.width=((scores.cat/max)*100)+"%";
}

// ── RESULT ─────────────────────────────────────────────────────
function showResult(){
  const d=t();
  const diff=Math.abs(scores.dog-scores.cat);
  let res;
  if(diff<=3)res=d.results.both;
  else if(scores.dog>scores.cat)res=d.results.dog;
  else res=d.results.cat;

  const COLOR=res===d.results.dog?"#FFD700":res===d.results.cat?"#FF6B9D":"#64FFDA";
  const GLOW=res===d.results.dog?"rgba(255,215,0,0.4)":res===d.results.cat?"rgba(255,107,157,0.4)":"rgba(100,255,218,0.3)";

  const card=document.getElementById("result-card");
  card.style.border=`2px solid ${COLOR}55`;
  card.style.setProperty("--glow",GLOW);

  document.getElementById("res-emoji").textContent=res.emoji;
  const title=document.getElementById("res-title");
  title.textContent=res.title;
  title.style.color=COLOR;
  title.style.textShadow=`0 0 20px ${COLOR}66`;

  const reasons=document.getElementById("res-reasons");
  reasons.innerHTML="";
  res.subs.forEach(s=>{
    const div=document.createElement("div");
    div.className="reason";
    div.style.cssText=`background:${COLOR}15;border:1px solid ${COLOR}33`;
    div.innerHTML=`<span class="check" style="color:${COLOR}">✓</span>${s}`;
    reasons.appendChild(div);
  });

  document.getElementById("res-breeds-label").textContent=d.breedsLabel;
  const breeds=document.getElementById("res-breeds");
  breeds.innerHTML="";
  res.breeds.forEach(b=>{
    const span=document.createElement("span");
    span.className="breed-tag";
    span.style.cssText=`background:${COLOR}20;border:1px solid ${COLOR}44;color:${COLOR}`;
    span.textContent=b;
    breeds.appendChild(span);
  });

  const max=40;
  document.getElementById("final-dog-num").textContent=`🐶 ${scores.dog}`;
  document.getElementById("final-cat-num").textContent=`🐱 ${scores.cat}`;

  const rb=document.getElementById("restart-btn");
  rb.textContent=d.restart;
  rb.style.background=COLOR;

  // update share links
  const shareMsg=d.shareText.replace('{title}',res.emoji+' '+res.title);
  const shareUrl=window.location.href;
  const enc=encodeURIComponent(shareMsg);
  const encUrl=encodeURIComponent(shareUrl);
  document.getElementById('sh-tw').href='https://twitter.com/intent/tweet?text='+enc+'&url='+encUrl;
  document.getElementById('sh-wh').href='https://api.whatsapp.com/send?text='+enc+'%20'+encUrl;
  document.getElementById('sh-tg').href='https://t.me/share/url?url='+encUrl+'&text='+enc;
  document.getElementById('sh-vk').href='https://vk.com/share.php?url='+encUrl+'&title='+enc;
  document.getElementById('share-label').textContent=d.shareLabel;

  show("result");

  setTimeout(()=>{
    document.getElementById("final-dog-bar").style.width=((scores.dog/max)*100)+"%";
    document.getElementById("final-cat-bar").style.width=((scores.cat/max)*100)+"%";
  },200);

  // confetti
  for(let i=0;i<14;i++){
    const c=document.createElement("div");
    c.className="confetti-dot";
    c.style.cssText=`left:${10+Math.random()*80}%;top:${Math.random()*50}%;background:${i%2===0?COLOR:"#fff"};animation:confettiAnim ${1+Math.random()}s ease ${Math.random()*.5}s 3 forwards;`;
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),4000);
  }
}

// ── SOUNDS (Web Audio API) ──────────────────────────────────────
const _ac=(()=>{ try{ return new (window.AudioContext||window.webkitAudioContext)(); }catch(e){ return null; } })();
function _resumeAC(){ if(_ac && _ac.state==='suspended') _ac.resume(); }
function _playTone(freq,type,vol,dur,bend){
  if(!_ac) return;
  _resumeAC();
  const o=_ac.createOscillator();
  const g=_ac.createGain();
  o.connect(g); g.connect(_ac.destination);
  o.type=type||'sine';
  o.frequency.setValueAtTime(freq,_ac.currentTime);
  if(bend) o.frequency.linearRampToValueAtTime(bend,_ac.currentTime+dur);
  g.gain.setValueAtTime(vol||0.18,_ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,_ac.currentTime+dur);
  o.start(); o.stop(_ac.currentTime+dur);
}
function sfxClick(){
  _playTone(520,'square',0.12,0.07,380);
}
function sfxNext(){
  _playTone(320,'sine',0.13,0.18,480);
  setTimeout(()=>_playTone(440,'sine',0.10,0.14),80);
}
function sfxResult(){
  [[523,0],[659,80],[784,160],[1047,260]].forEach(([f,d])=>{
    setTimeout(()=>_playTone(f,'triangle',0.15,0.35),d);
  });
}
function sfxRestart(){
  _playTone(440,'sine',0.11,0.18,300);
  setTimeout(()=>_playTone(330,'sine',0.08,0.22),120);
}

// ── RESTART ────────────────────────────────────────────────────
function restart(){
  sfxRestart();
  scores={dog:0,cat:0}; currentQ=0; busy=false;
  updateIntroText();
  show("intro");
}
function copyShareLink(){
  const url=window.location.href;
  const btn=document.getElementById('sh-copy');
  const orig=btn.textContent;
  if(navigator.clipboard){
    navigator.clipboard.writeText(url).then(()=>{ btn.textContent='✓ Copied'; setTimeout(()=>{ btn.textContent=orig; },2000); });
  } else {
    const ta=document.createElement('textarea');
    ta.value=url; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
    btn.textContent='✓ Copied'; setTimeout(()=>{ btn.textContent=orig; },2000);
  }
}
// Update SEO meta tags, canonical and hreflang alternates dynamically
function updateSEO(){
  try{
    const d = t();
    const desc = d.metaDesc || d.sub || 'Free 8-question quiz: Dog or Cat? Find out which pet perfectly matches your lifestyle.';
    const metaDesc = document.querySelector('meta[name="description"]');
    if(metaDesc) metaDesc.setAttribute('content', desc);

    // keywords
    let kwMeta = document.querySelector('meta[name="keywords"]');
    if(!kwMeta){ kwMeta=document.createElement('meta'); kwMeta.name='keywords'; document.head.appendChild(kwMeta); }
    if(d.metaKeywords) kwMeta.setAttribute('content', d.metaKeywords);
    const ogTitle = document.querySelector('meta[property="og:title"]');
    if(ogTitle) ogTitle.setAttribute('content', document.title);
    const ogDesc = document.querySelector('meta[property="og:description"]');
    if(ogDesc) ogDesc.setAttribute('content', desc);
    const twitterTitle = document.querySelector('meta[name="twitter:title"]');
    if(twitterTitle) twitterTitle.setAttribute('content', document.title);
    const twitterDesc = document.querySelector('meta[name="twitter:description"]');
    if(twitterDesc) twitterDesc.setAttribute('content', desc);

    // og:locale
    const localeMap={en:'en_US',es:'es_ES',ko:'ko_KR',zh:'zh_CN',ja:'ja_JP',ru:'ru_RU',hy:'hy_AM',fr:'fr_FR'};
    let ogLocale = document.querySelector('meta[property="og:locale"]');
    if(!ogLocale){ ogLocale=document.createElement('meta'); ogLocale.setAttribute('property','og:locale'); document.head.appendChild(ogLocale); }
    ogLocale.setAttribute('content', localeMap[lang] || 'en_US');
    let canonical = document.querySelector('link[rel="canonical"]');
    if(!canonical){ canonical = document.createElement('link'); canonical.rel='canonical'; document.head.appendChild(canonical); }
    const url = new URL(window.location.href);
    url.search = '';
    canonical.href = url.toString();

    // hreflang alternates (use ?lang=code so each language has its own URL)
    document.querySelectorAll('link[rel="alternate"][hreflang]').forEach(n=>n.remove());
    Object.keys(T).forEach(code=>{
      const link = document.createElement('link');
      link.rel = 'alternate'; link.hreflang = code;
      const u = new URL(window.location.href);
      u.searchParams.set('lang', code);
      link.href = u.toString();
      document.head.appendChild(link);
    });
    const defaultLink = document.createElement('link');
    defaultLink.rel = 'alternate'; defaultLink.hreflang = 'x-default';
    const u2 = new URL(window.location.href); u2.searchParams.set('lang','en'); defaultLink.href = u2.toString();
    document.head.appendChild(defaultLink);

    // update JSON-LD block
    const ld = document.getElementById('ld-json');
    if(ld){
      let obj={};
      try{ obj = JSON.parse(ld.textContent); }catch(e){}
      obj.name = document.title;
      obj.description = desc;
      obj.inLanguage = Object.keys(T);
      ld.textContent = JSON.stringify(obj);
    }
  }catch(e){ console.warn('SEO update failed', e); }
}

document.addEventListener('click',function(e){
  const wrap=document.getElementById('lang-dropdown-wrap');
  if(wrap && !wrap.contains(e.target)) closeLangMenu();
});

// Init
document.getElementById('footer-year').textContent = new Date().getFullYear();
updateIntroText();
// apply lang from URL param or navigator language when possible
try{
  const params = new URLSearchParams(window.location.search);
  const requested = params.get('lang');
  if(requested && T[requested]) setLang(requested);
  else {
    const nav = (navigator.language||navigator.userLanguage||'').slice(0,2);
    if(nav && T[nav]) setLang(nav);
  }
}catch(e){}
updateSEO();
